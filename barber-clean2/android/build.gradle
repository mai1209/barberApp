buildscript {
    ext {
    buildToolsVersion = "36.0.0"
    minSdkVersion = 24
    compileSdkVersion = 36
    targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")   
classpath("com.google.gms:google-services:4.4.1") }
}
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// ESTO ES CLAVE: Agregamos el bloque allprojects debajo del buildscript
allprojects {
    repositories {
        google()
        mavenCentral()
        mavenLocal()
        maven {
            // Esto busca las librerías estándar de RN
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            // Apuntar al repositorio maven local que viene con async-storage
            url("$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo")
        }
        maven { url 'https://www.jitpack.io' }
    }
}


apply plugin: "com.facebook.react.rootproject"